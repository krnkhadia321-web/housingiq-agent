<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HousingIQ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Login Screen --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
        }

        #login-screen h1 {
            font-size: 32px;
            color: #fff;
        }

        #login-screen p {
            color: #888;
            font-size: 15px;
        }

        #login-screen input {
            background: #1e2130;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 14px 20px;
            color: #fff;
            font-size: 16px;
            width: 320px;
            outline: none;
            text-align: center;
        }

        #login-screen input:focus {
            border-color: #2f6ef5;
        }

        #login-screen button {
            background: #2f6ef5;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 320px;
        }

        #login-screen button:hover {
            background: #1a5ce0;
        }

        /* --- Main App --- */
        #app {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 16px 24px;
            background: #1a1d27;
            border-bottom: 1px solid #2a2d3a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        header span {
            font-size: 13px;
            color: #888;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #888;
        }

        .user-badge strong {
            color: #fff;
        }

        .logout-btn {
            background: #1e2130;
            border: 1px solid #2a2d3a;
            color: #888;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .logout-btn:hover {
            color: #fff;
            border-color: #555;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 820px;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.agent {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            max-width: 600px;
        }

        .user .bubble {
            background: #2f6ef5;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .agent .bubble {
            background: #1e2130;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .card {
            background: #1e2130;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 16px;
            font-size: 13px;
            width: 100%;
            max-width: 520px;
        }

        .card h3 {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2d3a;
            color: #ccc;
        }

        .cost-row:last-child {
            border-bottom: none;
        }

        .cost-row.total {
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            margin-top: 4px;
        }

        .cost-row .label {
            color: #888;
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .compare-city {
            background: #13151f;
            border-radius: 8px;
            padding: 12px;
        }

        .compare-city h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .compare-city .city-total {
            font-size: 20px;
            font-weight: 700;
            color: #2f6ef5;
            margin-top: 6px;
        }

        .cheaper-badge {
            display: inline-block;
            background: #1a3a1a;
            color: #4caf50;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
        }

        .checklist-section {
            margin-bottom: 12px;
        }

        .checklist-section h4 {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .checklist-item {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            color: #ccc;
            font-size: 13px;
        }

        .checklist-item::before {
            content: '○';
            color: #2f6ef5;
            flex-shrink: 0;
        }

        .property-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2d3a;
        }

        .property-item:last-child {
            border-bottom: none;
        }

        .property-name {
            font-weight: 600;
            color: #fff;
        }

        .property-meta {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .property-rent {
            font-size: 16px;
            font-weight: 700;
            color: #2f6ef5;
        }

        .search-result {
            padding: 8px 0;
            border-bottom: 1px solid #2a2d3a;
        }

        .search-result:last-child {
            border-bottom: none;
        }

        .search-result a {
            color: #2f6ef5;
            font-size: 13px;
            text-decoration: none;
        }

        .search-result a:hover {
            text-decoration: underline;
        }

        .search-result p {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        .success-banner {
            background: #1a3a1a;
            border: 1px solid #2d5a2d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #4caf50;
            font-size: 13px;
        }

        #input-area {
            padding: 16px 24px;
            background: #1a1d27;
            border-top: 1px solid #2a2d3a;
            display: flex;
            gap: 12px;
        }

        #input-area input {
            flex: 1;
            background: #13151f;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        #input-area input:focus {
            border-color: #2f6ef5;
        }

        #input-area button {
            background: #2f6ef5;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #input-area button:hover {
            background: #1a5ce0;
        }

        #input-area button:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .typing {
            color: #555;
            font-size: 13px;
            padding: 8px 0;
        }
    </style>
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div style="font-size: 40px">🏠</div>
        <h1>HousingIQ</h1>
        <p>AI-powered housing research for any city</p>
        <input id="username-input" type="text" placeholder="Enter your name to get started" maxlength="30" />
        <button id="login-btn">Get Started</button>
    </div>

    <!-- Main App -->
    <div id="app">
        <header>
            <div>
                <h1>🏠 HousingIQ</h1>
                <span>AI-powered housing research for any city</span>
            </div>
            <div class="user-badge">
                <span>Logged in as <strong id="display-name"></strong></span>
                <button class="logout-btn" id="logout-btn">Log out</button>
            </div>
        </header>

        <div id="chat"></div>

        <div id="input-area">
            <input id="msg" type="text" placeholder="Ask about rent, compare cities, search listings..." />
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let sessionId = null;

        const loginScreen = document.getElementById('login-screen');
        const app = document.getElementById('app');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const displayName = document.getElementById('display-name');
        const logoutBtn = document.getElementById('logout-btn');
        const chat = document.getElementById('chat');
        const input = document.getElementById('msg');
        const sendBtn = document.getElementById('send');

        // --- Login ---
        function login() {
            const name = usernameInput.value.trim();
            if (!name) return;
            currentUser = name.toLowerCase().replace(/\s+/g, '-');
            sessionId = 'session-' + currentUser + '-' + Date.now();
            displayName.textContent = name;
            loginScreen.style.display = 'none';
            app.style.display = 'flex';
            localStorage.setItem('housingiq-user', name);
            addMessage('agent', `Welcome back, ${name}! Ask me to calculate living costs, compare cities, search rental prices, or manage your saved properties.`, null, null);
            input.focus();
        }

        loginBtn.addEventListener('click', login);
        usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        // Auto-login if returning user
        const savedUser = localStorage.getItem('housingiq-user');
        if (savedUser) {
            usernameInput.value = savedUser;
        }

        // --- Logout ---
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('housingiq-user');
            currentUser = null;
            sessionId = null;
            chat.innerHTML = '';
            usernameInput.value = '';
            app.style.display = 'none';
            loginScreen.style.display = 'flex';
        });

        // --- Chat ---
        function addMessage(role, text, toolUsed, toolData) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            wrapper.appendChild(bubble);

            if (toolData) {
                const card = buildCard(toolUsed, toolData);
                if (card) wrapper.appendChild(card);
            }

            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        function buildCard(toolUsed, data) {
            if (toolUsed === 'calculateTrueCost') {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
        <h3>💰 True Monthly Cost Breakdown</h3>
        <div class="cost-row"><span class="label">Rent</span><span>$${data.rent}</span></div>
        <div class="cost-row"><span class="label">Utilities</span><span>$${data.utilities}</span></div>
        <div class="cost-row"><span class="label">Commute</span><span>$${data.commute}</span></div>
        <div class="cost-row"><span class="label">Misc</span><span>$${data.misc}</span></div>
        <div class="cost-row total"><span>Total Monthly</span><span>$${data.totalMonthly}</span></div>
        <div class="cost-row"><span class="label">Annual Total</span><span>$${data.totalAnnual.toLocaleString()}</span></div>
        <div class="cost-row"><span class="label">Rent % of Total</span><span>${data.rentPercentage}%</span></div>
      `;
                return card;
            }

            if (toolUsed === 'compareCities' || toolUsed === 'compareSavedProperties') {
                const card = document.createElement('div');
                card.className = 'card';
                const c1 = data.city1 || { name: `${data.property1?.neighborhood}, ${data.property1?.city}`, rent: data.property1?.monthlyRent, utilities: 0, commute: 0, total: data.property1?.monthlyRent };
                const c2 = data.city2 || { name: `${data.property2?.neighborhood}, ${data.property2?.city}`, rent: data.property2?.monthlyRent, utilities: 0, commute: 0, total: data.property2?.monthlyRent };
                card.innerHTML = `
        <h3>🏙️ Comparison</h3>
        <div class="compare-grid">
          <div class="compare-city">
            <h4>${c1.name}</h4>
            <div class="cost-row"><span class="label">Rent</span><span>$${c1.rent}</span></div>
            <div class="city-total">$${c1.total}/mo</div>
            ${data.cheaper === c1.name ? '<span class="cheaper-badge">✓ Cheaper</span>' : ''}
          </div>
          <div class="compare-city">
            <h4>${c2.name}</h4>
            <div class="cost-row"><span class="label">Rent</span><span>$${c2.rent}</span></div>
            <div class="city-total">$${c2.total}/mo</div>
            ${data.cheaper === c2.name ? '<span class="cheaper-badge">✓ Cheaper</span>' : ''}
          </div>
        </div>
        <div class="cost-row"><span class="label">Monthly Saving</span><span>$${data.monthlySaving}</span></div>
        <div class="cost-row"><span class="label">Annual Saving</span><span>$${data.annualSaving.toLocaleString()}</span></div>
      `;
                return card;
            }

            if (toolUsed === 'generateMovingChecklist') {
                const card = document.createElement('div');
                card.className = 'card';
                let html = `<h3>📋 Moving Checklist — ${data.city}</h3>`;
                const sections = { beforeMoving: 'Before Moving', firstWeek: 'First Week', firstMonth: 'First Month' };
                for (const [key, label] of Object.entries(sections)) {
                    html += `<div class="checklist-section"><h4>${label}</h4>`;
                    for (const item of data[key]) {
                        html += `<div class="checklist-item">${item}</div>`;
                    }
                    html += `</div>`;
                }
                card.innerHTML = html;
                return card;
            }

            if (toolUsed === 'getSavedProperties') {
                if (!data.properties || data.properties.length === 0) return null;
                const card = document.createElement('div');
                card.className = 'card';
                let html = `<h3>🔖 Saved Properties (${data.count})</h3>`;
                for (const p of data.properties) {
                    html += `
          <div class="property-item">
            <div>
              <div class="property-name">${p.neighborhood}, ${p.city}</div>
              <div class="property-meta">${p.notes}</div>
            </div>
            <div class="property-rent">$${p.monthlyRent}/mo</div>
          </div>`;
                }
                card.innerHTML = html;
                return card;
            }

            if (toolUsed === 'saveProperty' && data.success) {
                const card = document.createElement('div');
                card.className = 'success-banner';
                card.textContent = `✓ Saved: ${data.property.neighborhood}, ${data.property.city} — $${data.property.monthlyRent}/mo`;
                return card;
            }

            if (toolUsed === 'deleteProperty') {
                const card = document.createElement('div');
                card.className = 'success-banner';
                card.style.background = data.success ? '#1a3a1a' : '#3a1a1a';
                card.style.borderColor = data.success ? '#2d5a2d' : '#5a2d2d';
                card.style.color = data.success ? '#4caf50' : '#f44336';
                card.textContent = data.success ? `✓ ${data.message}` : `✗ ${data.message}`;
                return card;
            }

            if (toolUsed === 'searchRentalData') {
                if (!data.results || data.results.length === 0) return null;
                const card = document.createElement('div');
                card.className = 'card';
                let html = `<h3>🔍 Sources</h3>`;
                for (const r of data.results.slice(0, 3)) {
                    html += `
          <div class="search-result">
            <a href="${r.url}" target="_blank">${r.title}</a>
            <p>${r.content}</p>
          </div>`;
                }
                card.innerHTML = html;
                return card;
            }

            return null;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text, null, null);
            input.value = '';
            sendBtn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'HousingIQ is thinking...';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId, userId: currentUser })
                });
                const data = await res.json();
                typing.remove();
                addMessage('agent', data.reply, data.toolUsed, data.toolData);
            } catch (err) {
                typing.remove();
                addMessage('agent', 'Something went wrong. Please try again.', null, null);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
